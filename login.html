<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - HumanizeAI</title>
  <link href="images/public/69f84ec111e02a7e43031920/d09b636a5_logo.png" rel="icon" type="image/svg+xml"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
      padding: 40px;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-container img {
      width: 60px;
      height: 60px;
      margin-bottom: 15px;
    }

    .login-container h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 10px;
      text-align: center;
    }

    .login-container p {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .login-button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin-top: 10px;
    }

    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .login-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      color: #e74c3c;
      font-size: 13px;
      margin-top: 8px;
      display: none;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .error-message.show {
      display: block;
    }

    .hint {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 12px;
      border-radius: 4px;
      margin-top: 20px;
      font-size: 13px;
      color: #667eea;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 15px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-container">
      <img src="images/public/69f84ec111e02a7e43031920/d09b636a5_logo.png" alt="HumanizeAI Logo"/>
      <h1>HumanizeAI</h1>
      <p>Acesse sua conta</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Usuário</label>
        <input 
          type="text" 
          id="username" 
          placeholder="Digite seu usuário"
          required
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input 
          type="password" 
          id="password" 
          placeholder="Digite sua senha"
          required
          autocomplete="current-password"
        />
      </div>

      <div class="error-message" id="errorMessage"></div>

      <button type="submit" class="login-button" id="loginButton">
        Acessar
      </button>

      <div class="loading" id="loading">
        <div class="spinner"></div>
      </div>
    </form>
  </div>

  <script>
    // Check if user is already logged in
    document.addEventListener('DOMContentLoaded', function() {
      const isLoggedIn = localStorage.getItem('humanizeai_logged_in');
      if (isLoggedIn === 'true') {
        window.location.href = 'index.html';
      }
    });

    function handleLogin(event) {
      event.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('errorMessage');
      const loginButton = document.getElementById('loginButton');
      const loading = document.getElementById('loading');

      // Clear previous error
      errorMessage.classList.remove('show');
      errorMessage.textContent = '';

      // Simple validation
      const correctUsername = 'nina3101';
      const correctPassword = 'nina3101';

      // Show loading state
      loginButton.disabled = true;
      loading.style.display = 'block';

      // Simulate API delay
      setTimeout(() => {
        if (username === correctUsername && password === correctPassword) {
          // Store authentication in localStorage
          localStorage.setItem('humanizeai_logged_in', 'true');
          localStorage.setItem('humanizeai_login_time', new Date().toISOString());
          
          // Redirect to main app
          window.location.href = 'index.html';
        } else {
          // Show error
          errorMessage.textContent = 'Usuário ou senha incorretos. Tente novamente.';
          errorMessage.classList.add('show');
          
          // Reset form
          document.getElementById('loginForm').reset();
          loginButton.disabled = false;
          loading.style.display = 'none';
          
          // Focus on username field
          document.getElementById('username').focus();
        }
      }, 500);
    }

    // Allow Enter key to submit
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
      }
    });
  </script>
</body>
</html>
